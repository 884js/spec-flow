<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Review — Annotation Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" media="(prefers-color-scheme: light)">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/8.0.2/diff.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
<style>
  :root {
    --bg-page:        #f5f9fc;
    --bg-content:     #ffffff;
    --bg-comment:     #eef6ff;
    --text-primary:   #1a1a1a;
    --text-secondary: #555555;
    --text-caption:   #888888;
    --accent:         #3ea8ff;
    --accent-hover:   #2196f3;
    --border:         #d6e3ed;
    --border-comment: #b8d4ea;
    --bg-code:        #eef2f7;
    --bg-pre:         #1a2638;
    --text-pre:       #e1e4e8;
    --color-danger:   #c0392b;
    --bg-selection:   #ddeeff;
    --bg-tab:         #e8f0f8;
    --bg-tab-active:  #ffffff;
    --font-sans:      'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
    --font-mono:      'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page:        #0d1117;
      --bg-content:     #161b22;
      --bg-comment:     #1c2333;
      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --text-caption:   #6e7681;
      --accent:         #58a6ff;
      --accent-hover:   #79c0ff;
      --border:         #30363d;
      --border-comment: #2d333b;
      --bg-code:        #1c2333;
      --bg-pre:         #0d1117;
      --text-pre:       #e6edf3;
      --color-danger:   #f85149;
      --bg-selection:   #1f3a5f;
      --bg-tab:         #1c2333;
      --bg-tab-active:  #161b22;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    font-size: 17px;
    line-height: 1.9;
    letter-spacing: 0.02em;
    color: var(--text-primary);
    background: var(--bg-page);
  }

  .header {
    background: var(--bg-page);
    padding: 14px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* Tab bar */
  .tab-bar {
    background: var(--bg-page);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 99;
  }

  .tab-bar:empty { display: none; }

  .tab-item {
    padding: 10px 24px;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-sans);
    color: var(--text-secondary);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab-item:hover { color: var(--text-primary); }

  .tab-item.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .btn {
    padding: 7px 18px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font-sans);
    letter-spacing: 0.04em;
    transition: background-color 0.15s, color 0.15s;
  }

  .btn:hover { background: var(--accent); color: var(--bg-page); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { background: transparent; color: var(--accent); }
  .btn-primary { background: var(--accent); color: var(--bg-page); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled:hover { background: var(--accent); color: var(--bg-page); }
  .btn-secondary { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn-secondary:hover { background: var(--border); color: var(--text-primary); }
  .btn-finish { border-color: var(--text-caption); color: var(--text-caption); }
  .btn-finish:hover { background: var(--text-caption); color: var(--bg-page); }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .content {
    background: var(--bg-content);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px 48px;
  }

  /* Override github-markdown-css defaults for layout integration */
  .content.markdown-body {
    font-family: var(--font-sans);
    font-size: 17px;
    line-height: 1.9;
    color: var(--text-primary);
    background: var(--bg-content);
  }

  .content input[type="checkbox"] { pointer-events: none; }

  /* Section hover comment button */
  .section-wrapper { position: relative; }

  .section-wrapper:hover .comment-btn {
    opacity: 1;
  }

  .comment-btn {
    position: absolute;
    left: -36px;
    top: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    background: var(--bg-content);
    color: var(--accent);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .comment-btn:hover { background: var(--accent); color: var(--bg-content); }

  /* Block-level comment buttons */
  .block-wrapper {
    position: relative;
  }

  .block-wrapper:hover > .block-comment-btn {
    opacity: 1;
  }

  .block-comment-btn {
    position: absolute;
    left: -28px;
    top: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-content);
    color: var(--text-caption);
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .block-comment-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Comment form */
  .comment-form {
    background: var(--bg-comment);
    border: 1px solid var(--border-comment);
    border-radius: 4px;
    padding: 14px;
    margin: 12px 0 20px;
  }

  .comment-form textarea {
    width: 100%;
    min-height: 60px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    font-family: var(--font-sans);
    background: var(--bg-content);
    color: var(--text-primary);
  }

  .comment-form textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .comment-form .form-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    justify-content: flex-end;
  }

  .comment-form .btn { font-size: 12px; padding: 5px 14px; }

  /* Added comments */
  .comment-item {
    background: var(--bg-comment);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    margin: 10px 0;
    border-radius: 0 4px 4px 0;
    font-size: 14px;
    line-height: 1.7;
  }

  .comment-item .comment-meta {
    font-size: 12px;
    color: var(--text-caption);
    margin-bottom: 4px;
  }

  .comment-item .comment-delete {
    float: right;
    background: none;
    border: none;
    color: var(--text-caption);
    cursor: pointer;
    font-size: 14px;
  }

  .comment-item .comment-delete:hover { color: var(--color-danger); }

  .selected-text {
    background: var(--bg-selection);
    border-bottom: 1.5px solid var(--border-comment);
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 12px;
    display: inline-block;
    margin-bottom: 4px;
  }

  /* Badge */
  .comment-count {
    background: var(--bg-comment);
    color: var(--accent);
    border: 1px solid var(--border-comment);
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 600;
    margin-left: 8px;
  }

  /* Selection tooltip */
  .selection-tooltip {
    position: absolute;
    background: var(--accent);
    color: var(--bg-page);
    border: none;
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(43,40,35,0.15);
    display: none;
  }
  .selection-tooltip:hover { background: var(--accent-hover); }

  /* Diff highlight */
  .diff-added {
    background: #d4edda;
    border-left: 3px solid #28a745;
    padding-left: 6px;
    margin-left: -9px;
  }

  @media (prefers-color-scheme: dark) {
    .diff-added {
      background: #1b3a2a;
      border-left-color: #3fb950;
    }
  }

  .diff-badge {
    display: inline-block;
    background: #28a745;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 10px;
    vertical-align: middle;
  }

  /* Spinner */
  .spinner {
    text-align: center;
    padding: 24px;
    color: var(--text-caption);
    font-size: 14px;
  }

  .spinner::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading */
  .loading { text-align: center; padding: 48px; color: var(--text-caption); }
</style>
</head>
<body>

<div class="header">
  <h1>Plan Review</h1>
  <div class="header-actions">
    <span id="commentCount" class="comment-count" style="display:none">0 comments</span>
    <button class="btn btn-primary" id="submitBtn" onclick="submitComments()" disabled>コメントを送信</button>
    <button class="btn btn-finish" id="finishBtn" onclick="finishReview()">レビュー完了</button>
  </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<button class="selection-tooltip" id="selectionTooltip">コメントを追加</button>

<div class="container">
  <div class="content markdown-body" id="content">
    <div class="loading">読み込み中...</div>
  </div>
  <div class="spinner" id="spinnerArea" style="display:none">修正中...</div>
</div>

<script>
// --- Multi-tab state ---
let tabs = []; // [{feature, planDir, title}]
let activeFeature = null;
// Per-tab comments: {feature: [{sectionHeading, selectedText, comment}]}
const tabComments = {};
// Per-tab last known timestamps for polling
const tabTimestamps = {};
let pollStatusInterval = null;
let pollPlansInterval = null;

// --- Init ---
async function init() {
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });

  await refreshTabs();

  // Start polling for plan list changes (tab add/remove)
  pollPlansInterval = setInterval(refreshTabs, 5000);

  // Start polling for plan content changes
  pollStatusInterval = setInterval(pollPlanStatus, 2000);
}

async function refreshTabs() {
  const res = await fetch('/api/plans');
  const data = await res.json();
  const newTabs = data.plans;

  // Detect changes
  const oldFeatures = new Set(tabs.map(t => t.feature));
  const newFeatures = new Set(newTabs.map(t => t.feature));

  tabs = newTabs;

  // Initialize comment arrays for new tabs
  for (const tab of tabs) {
    if (!tabComments[tab.feature]) {
      tabComments[tab.feature] = [];
    }
  }

  // Clean up removed tabs
  for (const f of oldFeatures) {
    if (!newFeatures.has(f)) {
      delete tabComments[f];
      delete tabTimestamps[f];
    }
  }

  renderTabBar();

  // Auto-select first tab if no active tab or active tab was removed
  if (!activeFeature || !newFeatures.has(activeFeature)) {
    if (tabs.length > 0) {
      switchTab(tabs[0].feature);
    } else {
      document.getElementById('content').innerHTML = '<div class="loading">全プランのレビューが完了しました。</div>';
    }
  }
}

function renderTabBar() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';

  bar.style.display = 'flex';
  for (const tab of tabs) {
    const el = document.createElement('button');
    el.className = 'tab-item' + (tab.feature === activeFeature ? ' active' : '');
    el.innerHTML = escapeHtml(tab.title || tab.feature);
    el.onclick = () => switchTab(tab.feature);
    bar.appendChild(el);
  }
}

async function switchTab(feature) {
  activeFeature = feature;
  renderTabBar();
  await loadPlan(feature);
  updateCount();
}

async function loadPlan(feature) {
  if (!feature) return;

  const res = await fetch(`/api/plans/${feature}/plan`);
  if (!res.ok) {
    document.getElementById('content').innerHTML = `<div class="loading">プラン "${feature}" の読み込みに失敗しました。</div>`;
    return;
  }

  const data = await res.json();
  const html = marked.parse(data.content);
  document.getElementById('content').innerHTML = html;

  // Render Mermaid diagrams
  const codeBlocks = document.querySelectorAll('pre code.language-mermaid');
  for (const block of codeBlocks) {
    const pre = block.parentElement;
    const container = document.createElement('div');
    container.className = 'mermaid';
    container.textContent = block.textContent;
    pre.replaceWith(container);
  }
  await mermaid.run({ nodes: document.querySelectorAll('.mermaid') });

  // Syntax highlighting
  hljs.highlightAll();

  // Remove disabled from checkboxes
  document.querySelectorAll('.content input[type="checkbox"]').forEach(cb => cb.removeAttribute('disabled'));

  // Apply diff highlights if old version is available
  if (data.old && typeof Diff !== 'undefined') {
    applyDiffHighlights(data.old, data.content);
  }

  wrapSections();

  // Re-render existing comments for this tab
  renderExistingComments(feature);

  // Hide spinner
  document.getElementById('spinnerArea').style.display = 'none';
  enableButtons();
}

function renderExistingComments(feature) {
  const comments = tabComments[feature] || [];
  // Re-add comment items to the DOM based on section headings
  for (let i = 0; i < comments.length; i++) {
    const c = comments[i];
    const wrappers = document.querySelectorAll('.section-wrapper');
    for (const wrapper of wrappers) {
      const heading = wrapper.querySelector('h1, h2, h3');
      if (heading && c.sectionHeading.endsWith(heading.textContent)) {
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.innerHTML = `
          <button class="comment-delete" onclick="deleteComment(${i}, this)">&times;</button>
          ${c.selectedText ? `<div class="selected-text">"${escapeHtml(c.selectedText).substring(0, 80)}"</div>` : ''}
          <div>${escapeHtml(c.comment)}</div>
        `;
        heading.after(item);
        break;
      }
    }
  }
}

function applyDiffHighlights(oldText, newText) {
  const diff = Diff.diffLines(oldText, newText);
  const addedLines = new Set();
  let lineNum = 0;
  for (const part of diff) {
    if (part.removed) continue;
    const lines = part.value.split('\n');
    const count = part.value.endsWith('\n') ? lines.length - 1 : lines.length;
    if (part.added) {
      for (let i = 0; i < count; i++) {
        addedLines.add(lineNum + i);
      }
    }
    lineNum += count;
  }

  if (addedLines.size === 0) return;

  const newLines = newText.split('\n');
  const content = document.getElementById('content');

  const blocks = content.querySelectorAll('p, li, h1, h2, h3, h4, h5, h6, tr, blockquote, pre');
  for (const block of blocks) {
    const blockText = block.textContent.trim();
    if (!blockText) continue;

    const isChanged = newLines.some((line, idx) => {
      if (!addedLines.has(idx)) return false;
      const trimmed = line.replace(/^[#\-*>|\s]+/, '').replace(/\|/g, ' ').replace(/\s+/g, ' ').trim();
      if (trimmed.length <= 3) return false;
      const normalizedBlock = blockText.replace(/\s+/g, ' ');
      return normalizedBlock.includes(trimmed) || trimmed.split(/\s+/).filter(w => w.length > 3).every(w => normalizedBlock.includes(w));
    });

    if (isChanged) {
      block.classList.add('diff-added');
    }
  }

  const badge = document.createElement('span');
  badge.className = 'diff-badge';
  badge.textContent = `${addedLines.size} lines changed`;
  document.querySelector('.header-actions').prepend(badge);
}

function wrapSections() {
  const content = document.getElementById('content');
  const headings = content.querySelectorAll('h1, h2, h3');

  headings.forEach(heading => {
    const wrapper = document.createElement('div');
    wrapper.className = 'section-wrapper';

    const btn = document.createElement('button');
    btn.className = 'comment-btn';
    btn.textContent = '+';
    btn.onclick = () => openCommentForm(wrapper, heading.textContent);

    heading.parentNode.insertBefore(wrapper, heading);
    wrapper.appendChild(btn);
    wrapper.appendChild(heading);

    let next = wrapper.nextSibling;
    while (next && !(next.nodeType === 1 && /^H[123]$/.test(next.tagName))) {
      const moved = next;
      next = next.nextSibling;
      wrapper.appendChild(moved);
    }

    const blocks = wrapper.querySelectorAll(':scope > p, :scope > ul > li, :scope > ol > li, :scope > table, :scope > blockquote, :scope > pre');
    blocks.forEach(block => {
      const bw = document.createElement('div');
      bw.className = 'block-wrapper';
      block.parentNode.insertBefore(bw, block);
      bw.appendChild(block);

      const bbtn = document.createElement('button');
      bbtn.className = 'block-comment-btn';
      bbtn.textContent = '+';
      bbtn.onclick = () => {
        const blockText = block.textContent.trim().substring(0, 80);
        openCommentForm(wrapper, heading.textContent, blockText);
      };
      bw.appendChild(bbtn);
    });
  });
}

function openCommentForm(wrapper, sectionHeading, blockText) {
  if (wrapper.querySelector('.comment-form')) return;

  const selectedText = blockText || window.getSelection().toString().trim();

  const form = document.createElement('div');
  form.className = 'comment-form';

  let selectedHtml = '';
  if (selectedText) {
    selectedHtml = `<div class="selected-text">選択: "${selectedText.substring(0, 100)}${selectedText.length > 100 ? '...' : ''}"</div>`;
  }

  form.innerHTML = `
    ${selectedHtml}
    <textarea placeholder="コメントを入力..."></textarea>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="this.closest('.comment-form').remove()">キャンセル</button>
      <button class="btn btn-primary" onclick="addComment(this, '${sectionHeading.replace(/'/g, "\\'")}', '${(selectedText || '').replace(/'/g, "\\'")}')">追加</button>
    </div>
  `;

  const heading = wrapper.querySelector('h1, h2, h3');
  heading.after(form);
  form.querySelector('textarea').focus();
}

function addComment(btn, sectionHeading, selectedText) {
  if (!activeFeature) return;

  const form = btn.closest('.comment-form');
  const textarea = form.querySelector('textarea');
  const text = textarea.value.trim();
  if (!text) return;

  const heading = form.closest('.section-wrapper').querySelector('h1, h2, h3');
  const prefix = heading ? '#'.repeat(parseInt(heading.tagName[1])) + ' ' : '## ';
  const comment = { sectionHeading: `${prefix}${sectionHeading}`, selectedText: selectedText || undefined, comment: text };

  if (!tabComments[activeFeature]) tabComments[activeFeature] = [];
  tabComments[activeFeature].push(comment);

  const comments = tabComments[activeFeature];
  const idx = comments.length - 1;
  const item = document.createElement('div');
  item.className = 'comment-item';
  item.innerHTML = `
    <button class="comment-delete" onclick="deleteComment(${idx}, this)">&times;</button>
    ${selectedText ? `<div class="selected-text">"${selectedText.substring(0, 80)}${selectedText.length > 80 ? '...' : ''}"</div>` : ''}
    <div>${escapeHtml(text)}</div>
  `;
  form.replaceWith(item);
  updateCount();
}

function deleteComment(idx, btn) {
  if (!activeFeature) return;
  tabComments[activeFeature].splice(idx, 1);
  btn.closest('.comment-item').remove();
  updateCount();
  document.querySelectorAll('.comment-item .comment-delete').forEach((b, i) => {
    b.onclick = () => deleteComment(i, b);
  });
}

function updateCount() {
  const comments = tabComments[activeFeature] || [];
  const el = document.getElementById('commentCount');
  const submitBtn = document.getElementById('submitBtn');

  if (comments.length > 0) {
    el.style.display = 'inline';
    el.textContent = `${comments.length} comment${comments.length > 1 ? 's' : ''}`;
    submitBtn.disabled = false;
  } else {
    el.style.display = 'none';
    submitBtn.disabled = true;
  }
}

function enableButtons() {
  document.getElementById('submitBtn').disabled = !(tabComments[activeFeature]?.length > 0);
  document.getElementById('finishBtn').disabled = false;
}

function disableButtons() {
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('finishBtn').disabled = true;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function submitComments() {
  if (!activeFeature) return;
  const comments = tabComments[activeFeature] || [];
  if (comments.length === 0) return;

  disableButtons();
  document.getElementById('spinnerArea').style.display = 'block';

  await fetch(`/api/plans/${activeFeature}/comments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ comments })
  });

  // Clear comments for this tab
  tabComments[activeFeature] = [];
  updateCount();

  // Record current timestamp so polling can detect change
  try {
    const statusRes = await fetch(`/api/plans/${activeFeature}/status`);
    const statusData = await statusRes.json();
    tabTimestamps[activeFeature] = statusData.lastModified;
  } catch (e) {
    // Will be picked up by polling
  }
}

async function finishReview() {
  if (!activeFeature) return;

  await fetch(`/api/plans/${activeFeature}/finish`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  });

  // Remove this tab
  delete tabComments[activeFeature];
  delete tabTimestamps[activeFeature];

  const removedFeature = activeFeature;
  tabs = tabs.filter(t => t.feature !== removedFeature);

  if (tabs.length > 0) {
    activeFeature = tabs[0].feature;
    renderTabBar();
    await loadPlan(activeFeature);
    updateCount();
  } else {
    activeFeature = null;
    renderTabBar();
    document.getElementById('content').innerHTML = '<div class="loading">レビュー完了しました。このタブを閉じてください。</div>';
    document.getElementById('commentCount').style.display = 'none';
    disableButtons();
  }
}

async function pollPlanStatus() {
  if (!activeFeature) return;

  try {
    const res = await fetch(`/api/plans/${activeFeature}/status`);
    if (!res.ok) return;
    const data = await res.json();

    const prevTimestamp = tabTimestamps[activeFeature];
    if (prevTimestamp && data.lastModified > prevTimestamp) {
      // Plan was updated — reload
      tabTimestamps[activeFeature] = data.lastModified;
      await loadPlan(activeFeature);
      updateCount();
    } else if (!prevTimestamp) {
      tabTimestamps[activeFeature] = data.lastModified;
    }
  } catch (e) {
    // Server may have stopped
  }
}

// Selection-based comment tooltip
document.addEventListener('mouseup', () => {
  const tooltip = document.getElementById('selectionTooltip');
  const sel = window.getSelection();
  const text = sel.toString().trim();

  if (!text || text.length < 2) {
    tooltip.style.display = 'none';
    return;
  }

  const anchorNode = sel.anchorNode;
  const wrapper = anchorNode?.parentElement?.closest?.('.section-wrapper');
  if (!wrapper) {
    tooltip.style.display = 'none';
    return;
  }

  const range = sel.getRangeAt(0);
  const rect = range.getBoundingClientRect();
  tooltip.style.display = 'block';
  tooltip.style.left = `${rect.left + rect.width / 2 - 50}px`;
  tooltip.style.top = `${rect.top + window.scrollY - 32}px`;

  tooltip.onclick = () => {
    const heading = wrapper.querySelector('h1, h2, h3');
    if (heading) openCommentForm(wrapper, heading.textContent);
    tooltip.style.display = 'none';
  };
});

document.addEventListener('mousedown', (e) => {
  if (e.target.id !== 'selectionTooltip') {
    document.getElementById('selectionTooltip').style.display = 'none';
  }
});

init();
</script>
